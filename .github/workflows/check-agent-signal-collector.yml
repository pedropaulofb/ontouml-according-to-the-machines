name: Scheduled check-agent signal collector

run-name: Scheduled check-agent signal collector (${{ github.event_name }})

"on":
  schedule:
    # Every 20 minutes, UTC. Offset away from minute 00 to reduce scheduler contention.
    - cron: "13,33,53 * * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Issue-manager mode."
        type: choice
        required: true
        default: post
        options:
          - generate
          - dry-run
          - post

      provider:
        description: "LLM provider adapter."
        type: choice
        required: true
        default: groq
        options:
          - groq
          - gemini

      selection:
        description: "How to select triples from the full page x agent x model plan."
        type: choice
        required: true
        default: rotate
        options:
          - rotate
          - first

      rotation_seed:
        description: "Time seed for rotating selection when rotation_index is omitted."
        type: choice
        required: true
        default: hourly
        options:
          - hourly
          - daily

      rotation_index:
        description: "Optional explicit non-negative rotation index for deterministic manual runs."
        type: string
        required: false
        default: ""

      pages:
        description: "Optional comma- or newline-separated page list. If empty, all canonical stereotype pages are considered."
        type: string
        required: false
        default: ""

      agents:
        description: "Comma-separated agents."
        type: string
        required: true
        default: "page-hygiene-checker,language-style-checker"

      models:
        description: "Comma-separated provider-specific models. For Gemini, use values such as gemini-2.5-flash."
        type: string
        required: true
        default: "llama-3.3-70b-versatile,openai/gpt-oss-20b"

      max_runs:
        description: "Maximum number of selected triples to run. Use 1 for rotating scheduled collection."
        type: string
        required: true
        default: "1"

      sleep_seconds:
        description: "Seconds to sleep between selected triples."
        type: string
        required: true
        default: "0"

      max_completion_tokens:
        description: "Optional provider completion-token cap. Leave empty to use provider-specific workflow defaults."
        type: string
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  collect-check-agent-signal:
    name: Collect rotating check-agent signal
    runs-on: ubuntu-latest

    # No concurrency block: scheduled runs are intentionally allowed to overlap.

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GH_TOKEN: ${{ github.token }}

      WORKFLOW_MODE: ${{ github.event.inputs.mode }}
      WORKFLOW_PROVIDER: ${{ github.event.inputs.provider }}
      WORKFLOW_SELECTION: ${{ github.event.inputs.selection }}
      WORKFLOW_ROTATION_SEED: ${{ github.event.inputs.rotation_seed }}
      WORKFLOW_ROTATION_INDEX: ${{ github.event.inputs.rotation_index }}
      WORKFLOW_PAGES: ${{ github.event.inputs.pages }}
      WORKFLOW_AGENTS: ${{ github.event.inputs.agents }}
      WORKFLOW_MODELS: ${{ github.event.inputs.models }}
      WORKFLOW_MAX_RUNS: ${{ github.event.inputs.max_runs }}
      WORKFLOW_SLEEP_SECONDS: ${{ github.event.inputs.sleep_seconds }}
      WORKFLOW_MAX_COMPLETION_TOKENS: ${{ github.event.inputs.max_completion_tokens }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Show runtime context
        shell: bash
        run: |
          set -euo pipefail

          echo "Event: ${GITHUB_EVENT_NAME}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Ref: ${GITHUB_REF}"
          echo "SHA: ${GITHUB_SHA}"

          python --version
          python - <<'PY'
          from importlib import metadata

          for package in ("groq", "google-genai"):
              try:
                  version = metadata.version(package)
              except metadata.PackageNotFoundError:
                  version = "not installed"
              print(f"{package}=={version}")
          PY

      - name: Validate required secrets and tools
        shell: bash
        run: |
          set -euo pipefail

          provider="${WORKFLOW_PROVIDER:-groq}"

          case "$provider" in
            groq)
              if [[ -z "${GROQ_API_KEY:-}" ]]; then
                echo "::error::Missing required repository secret: GROQ_API_KEY"
                exit 1
              fi
              ;;
            gemini)
              if [[ -z "${GEMINI_API_KEY:-}" ]]; then
                echo "::error::Missing required repository secret: GEMINI_API_KEY"
                exit 1
              fi
              ;;
            *)
              echo "::error::Unsupported provider: ${provider}"
              exit 1
              ;;
          esac

          gh --version
          gh auth status

      - name: Compile Phase 2 scripts
        shell: bash
        run: |
          set -euo pipefail

          python -m py_compile \
            scripts/phase-2/run_check_agent.py \
            scripts/phase-2/run_check_batch.py \
            scripts/phase-2/issue_manager.py \
            scripts/phase-2/providers/groq.py \
            scripts/phase-2/providers/gemini.py

      - name: Run check-agent signal collector
        shell: bash
        run: |
          set -euo pipefail

          trim() {
            printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          default_groq_models="llama-3.3-70b-versatile,openai/gpt-oss-20b"

          mode="${WORKFLOW_MODE:-post}"
          provider="${WORKFLOW_PROVIDER:-groq}"
          selection="${WORKFLOW_SELECTION:-rotate}"
          rotation_seed="${WORKFLOW_ROTATION_SEED:-hourly}"
          rotation_index="${WORKFLOW_ROTATION_INDEX:-}"
          pages_input="${WORKFLOW_PAGES:-}"
          agents_input="${WORKFLOW_AGENTS:-page-hygiene-checker,language-style-checker}"
          models_input="${WORKFLOW_MODELS:-$default_groq_models}"
          max_runs="${WORKFLOW_MAX_RUNS:-1}"
          sleep_seconds="${WORKFLOW_SLEEP_SECONDS:-0}"
          max_completion_tokens="${WORKFLOW_MAX_COMPLETION_TOKENS:-}"

          if [[ "$provider" == "gemini" && "$models_input" == "$default_groq_models" ]]; then
            echo "Provider is gemini and Groq default models were supplied; using gemini-2.5-flash."
            models_input="gemini-2.5-flash"
          fi

          if [[ -z "$max_completion_tokens" && "$provider" == "gemini" ]]; then
            max_completion_tokens="8000"
          fi

          if [[ -z "$rotation_index" && "${GITHUB_EVENT_NAME:-}" == "schedule" ]]; then
            rotation_index="$(($(date -u +%s) / 1200))"
          fi

          page_args=()
          if [[ -n "$pages_input" ]]; then
            pages_normalized="${pages_input//,/$'\n'}"

            while IFS= read -r page; do
              page="$(trim "$page")"
              if [[ -n "$page" ]]; then
                page_args+=(--page "$page")
              fi
            done <<< "$pages_normalized"
          else
            page_args+=(--pages-glob "docs/stereotypes/classes/*.md")
            page_args+=(--pages-glob "docs/stereotypes/relations/*.md")
            page_args+=(--exclude-pages-glob "docs/stereotypes/**/index.md")
          fi

          agent_args=()
          IFS=',' read -ra agents <<< "$agents_input"
          for agent in "${agents[@]}"; do
            agent="$(trim "$agent")"
            if [[ -n "$agent" ]]; then
              agent_args+=(--agent "$agent")
            fi
          done

          model_args=()
          IFS=',' read -ra models <<< "$models_input"
          for model in "${models[@]}"; do
            model="$(trim "$model")"
            if [[ -n "$model" ]]; then
              model_args+=(--model "$model")
            fi
          done

          rotation_args=()
          if [[ -n "$rotation_index" ]]; then
            rotation_args+=(--rotation-index "$rotation_index")
          fi

          completion_args=()
          if [[ -n "$max_completion_tokens" ]]; then
            completion_args+=(--max-completion-tokens "$max_completion_tokens")
          fi

          echo "Mode: ${mode}"
          echo "Provider: ${provider}"
          echo "Selection: ${selection}"
          echo "Rotation seed: ${rotation_seed}"
          echo "Rotation index: ${rotation_index:-n/a}"
          echo "Max runs: ${max_runs}"
          echo "Sleep seconds: ${sleep_seconds}"
          echo "Max completion tokens: ${max_completion_tokens:-default}"

          python scripts/phase-2/run_check_batch.py \
            "${page_args[@]}" \
            "${agent_args[@]}" \
            --provider "$provider" \
            "${model_args[@]}" \
            --mode "$mode" \
            --repo "$GITHUB_REPOSITORY" \
            --selection "$selection" \
            --rotation-seed "$rotation_seed" \
            "${rotation_args[@]}" \
            --max-runs "$max_runs" \
            --sleep-seconds "$sleep_seconds" \
            "${completion_args[@]}" \
            --allow-rejected-check-outputs

      - name: Upload check-agent artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: check-agent-signal-collector-${{ github.run_id }}
          path: .tmp/phase-2
          if-no-files-found: warn
          retention-days: 90
